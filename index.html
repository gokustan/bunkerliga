<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap">
<title>Bunkerliga</title>
<style>
:root {
  --bg: #f4f5f7;
  --bg2: #ffffff;
  --bg3: #eef0f4;
  --bg4: #e4e7ed;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --txt: #141820;
  --txt2: #4a5068;
  --txt3: #9096aa;
  --gold: #c47f00;
  --gold2: #a06400;
  --red: #d42b2b;
  --green: #1a9e55;
  --blue: #2255cc;
  --accent: #c47f00;
  --c-gok: #0E416A;
  --c-emr: #FF3DF2;
  --c-bat: #00FFFF;
  --c-sey: #FF1B0A;
  --c-guv: #F3FF47;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--txt);font-family:"DM Sans",sans-serif;min-height:100vh;overflow-x:hidden}
body{background:
  radial-gradient(ellipse 80% 40% at 50% -10%, rgba(34,85,204,0.05) 0%, transparent 70%),
  radial-gradient(ellipse 60% 30% at 80% 90%, rgba(196,127,0,0.04) 0%, transparent 60%),
  var(--bg);
}

/* --- HEADER --- */
.header{padding:2.5rem 1.5rem 0;text-align:center;position:relative}
.header-title{font-family:"Bebas Neue",sans-serif;font-size:clamp(3rem,8vw,6rem);letter-spacing:0.08em;background:linear-gradient(135deg,#1a2040 30%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:0.9}
.header-sub{font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:var(--txt3);margin-top:10px}
.header-divider{width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20px auto 0}

/* --- TABS --- */
.tabs{display:flex;justify-content:center;gap:4px;padding:2rem 1rem 0;flex-wrap:wrap}
.tab{background:none;border:1px solid var(--border);border-radius:6px;padding:8px 20px;font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;letter-spacing:0.04em;transition:all .2s}
.tab:hover{border-color:var(--border2);color:var(--txt)}
.tab.active{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600}
.panel{display:none;padding:2rem 1.5rem;max-width:960px;margin:0 auto;animation:fadeIn .25s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* --- SECTION TITLE --- */
.stitle{font-family:"Bebas Neue",sans-serif;font-size:1.4rem;letter-spacing:0.1em;color:var(--txt2);margin-bottom:1rem;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* --- CUP CARDS --- */
.cup-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:2.5rem}
.cup-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 14px;text-align:center;position:relative;overflow:hidden;transition:transform .2s,border-color .2s}
.cup-card:hover{transform:translateY(-3px);border-color:var(--border2)}
.cup-card.has-cups{border-color:rgba(245,200,66,0.25)}
.cup-card.has-cups::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(245,200,66,0.07),transparent);pointer-events:none}
.cup-logo{width:52px;height:52px;object-fit:contain;margin:0 auto 10px;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5))}
.cup-logo-dot{width:52px;height:52px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:"Bebas Neue",sans-serif;font-size:1.4rem}
.cup-name{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--txt2);margin-bottom:6px}
.cup-count{font-family:"Bebas Neue",sans-serif;font-size:3rem;line-height:1;color:var(--gold)}
.cup-count.zero{color:var(--txt3);font-size:2rem}
.cup-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3);margin-top:2px}
.trophy-icons{font-size:14px;margin-top:4px;letter-spacing:2px}

/* --- CHAMPS LIST --- */
.champs{display:flex;flex-direction:column;gap:8px;margin-bottom:2.5rem}
.champ-row{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;transition:border-color .2s}
.champ-row:hover{border-color:var(--border2)}
.champ-row.winner{border-color:rgba(245,200,66,0.2)}
.champ-badge{font-family:"Bebas Neue",sans-serif;font-size:11px;letter-spacing:0.15em;color:var(--txt3);min-width:130px}
.champ-logo{width:30px;height:30px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4))}
.champ-logo-dot{width:30px;height:30px;border-radius:50%;flex-shrink:0}
.champ-team{font-size:14px;font-weight:600;color:var(--txt)}
.champ-trophy{margin-left:auto;font-size:18px}
.champ-note{font-size:12px;color:var(--txt3);font-style:italic;margin-left:auto}
.champ-row.scandal{border-color:rgba(232,65,65,0.2);background:rgba(232,65,65,0.04)}

/* --- OVERALL GRID --- */
.overall-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:2rem}
.ocard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;transition:transform .2s,border-color .2s}
.ocard:hover{transform:translateY(-2px);border-color:var(--border2)}
.ocard-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ocard-logo{width:28px;height:28px;object-fit:contain}
.ocard-dot{width:28px;height:28px;border-radius:50%;flex-shrink:0}
.ocard-name{font-weight:600;font-size:13px;color:var(--txt)}
.ocard-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.stat{text-align:center}
.stat-val{font-family:"Bebas Neue",sans-serif;font-size:1.3rem;line-height:1;color:var(--txt)}
.stat-val.win{color:var(--green)}
.stat-val.loss{color:var(--red)}
.stat-lbl{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--txt3);margin-top:1px}
.ocard-bar{height:3px;border-radius:2px;background:var(--bg4);margin-top:10px;overflow:hidden}
.ocard-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* --- CHART --- */
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:2rem}
.chart-title{font-family:"Bebas Neue",sans-serif;font-size:1rem;letter-spacing:0.1em;color:var(--txt2);margin-bottom:14px}

/* --- SEASON SELECTOR --- */
.season-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem}
.sbtn{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;color:var(--txt2);cursor:pointer;letter-spacing:0.04em;transition:all .15s}
.sbtn:hover{border-color:var(--border2);color:var(--txt)}
.sbtn.active{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:700}

/* --- STANDINGS TABLE --- */
.tbl-wrap{overflow-x:auto;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:1rem}
table.st{width:100%;border-collapse:collapse;font-size:13px}
.st th{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3);padding:12px 10px;border-bottom:1px solid var(--border);text-align:center}
.st th:nth-child(2){text-align:left}
.st td{padding:11px 10px;border-bottom:1px solid rgba(255,255,255,0.04);text-align:center;color:var(--txt)}
.st td:nth-child(2){text-align:left}
.st tr:last-child td{border-bottom:none}
.st tr.cr td{background:rgba(245,200,66,0.04)}
.st tr:hover td{background:rgba(255,255,255,0.03)}
.pos-badge{width:22px;height:22px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--bg4);color:var(--txt3)}
.pos-badge.p1{background:rgba(245,200,66,0.2);color:var(--gold)}
.tcell{display:flex;align-items:center;gap:8px}
.tcell-logo{width:22px;height:22px;object-fit:contain}
.tcell-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.val-pos{color:var(--green);font-weight:600}
.val-neg{color:var(--red)}
.val-pts{font-weight:700;color:var(--txt)}
.s-note{display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(232,65,65,0.08);border:1px solid rgba(232,65,65,0.2);border-radius:8px;font-size:12px;color:#ff7070;margin-top:10px}

/* --- H2H TABLE --- */
.h2h-wrap{overflow-x:auto;margin-bottom:1rem}
table.h2h{border-collapse:collapse;min-width:520px;width:100%;font-size:12px}
.h2h th{background:var(--bg2);font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--txt3);padding:10px 8px;border:1px solid var(--border);text-align:center}
.h2h th.thl{text-align:left;min-width:110px}
.h2h td{border:1px solid var(--border);padding:9px 8px;text-align:center;background:var(--bg2);transition:background .15s}
.h2h .same{background:var(--bg3);color:var(--txt3)}
.h2h .hcell{cursor:pointer}
.h2h .hcell:hover{background:var(--bg4)}
.hwin{color:var(--green);font-weight:600}
.hloss{color:var(--red)}
.hdraw{color:var(--txt2)}
.h2h-detail{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:16px;display:none;animation:fadeIn .2s ease}
.h2h-detail.vis{display:block}
.hd-title{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;margin-bottom:16px}
.hd-stats{display:flex;gap:12px;flex-wrap:wrap}
.hd-stat{flex:1;min-width:60px;background:var(--bg3);border-radius:8px;padding:12px 8px;text-align:center}
.hd-stat-val{font-family:"Bebas Neue",sans-serif;font-size:1.6rem;line-height:1}
.hd-stat-lbl{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3);margin-top:2px}
.hd-bar{background:var(--bg4);height:6px;border-radius:3px;overflow:hidden;margin-top:12px}
.hd-bar-fill{height:100%;border-radius:3px}
.hd-bar-labels{display:flex;justify-content:space-between;font-size:11px;font-weight:600;margin-bottom:4px}

/* --- MATCH LIST --- */
.mfilts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.2rem}
.mfbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:5px 12px;font-family:"DM Sans",sans-serif;font-size:11px;font-weight:500;color:var(--txt2);cursor:pointer;letter-spacing:0.04em;transition:all .15s}
.mfbtn:hover{border-color:var(--border2);color:var(--txt)}
.mfbtn.active{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:700}
.mlist{display:flex;flex-direction:column;gap:5px}
.mrow{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;transition:border-color .15s}
.mrow:hover{border-color:var(--border2)}
.mtag{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--txt3);background:var(--bg3);padding:3px 8px;border-radius:4px;min-width:80px;text-align:center;flex-shrink:0}
.mteam{flex:1;display:flex;align-items:center;justify-content:flex-end;gap:5px;font-weight:500;font-size:12px;color:var(--txt2)}
.mteam.win{color:var(--txt);font-weight:600}
.mscore{font-family:"Bebas Neue",sans-serif;font-size:1.1rem;padding:0 8px;min-width:52px;text-align:center;color:var(--txt);letter-spacing:0.05em;flex-shrink:0}
.mteama{flex:1;display:flex;align-items:center;gap:5px;font-weight:500;font-size:12px;color:var(--txt2)}
.mteama.win{color:var(--txt);font-weight:600}
.mike{font-size:10px;font-weight:700;letter-spacing:0.06em;color:var(--red);background:rgba(232,65,65,0.12);padding:2px 7px;border-radius:3px;flex-shrink:0}
.mlogo{width:16px;height:16px;object-fit:contain;flex-shrink:0}
</style>
</head>

function logo(t,s){const l=LOGOS[t];if(!l)return`<span class="tcell-dot" style="width:${s}px;height:${s}px;border-radius:50%;background:${CLR[t]||'#888'}"></span>`;return`<img src="${l}" width="${s}" height="${s}" style="object-fit:contain;flex-shrink:0;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5))" alt="">`;}
function dot(t,s){return`<span style="display:inline-block;width:${s}px;height:${s}px;border-radius:50%;background:${CLR[t]||'#888'};flex-shrink:0"></span>`;}

function showTab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

// OVERVIEW
function buildOverview(){
  // Cup grid
  const cg=document.getElementById('cup-grid');
  TEAMS.forEach(t=>{
    const c=CUPS[t]||0;
    const hasc=c>0;
    cg.innerHTML+=`<div class="cup-card${hasc?' has-cups':''}">
      <img src="${LOGOS[t]}" class="cup-logo" alt="${t}">
      <div class="cup-name">${t}</div>
      <div class="${c>0?'cup-count':'cup-count zero'}">${c}</div>
      <div class="cup-label">${c===0?'kupa yok':'kupa'}</div>
      ${c>0?`<div class="trophy-icons">${'🏆'.repeat(c)}</div>`:''}
    </div>`;
  });

  // Champs
  const cl=document.getElementById('champ-list');
  CHAMPS.forEach(ch=>{
    if(ch.c){
      cl.innerHTML+=`<div class="champ-row winner">
        <span class="champ-badge">${ch.s}</span>
        ${logo(ch.c,30)}
        <span class="champ-team">${ch.c}</span>
        <span class="champ-trophy">🏆</span>
      </div>`;
    }else{
      cl.innerHTML+=`<div class="champ-row scandal">
        <span class="champ-badge">${ch.s}</span>
        <span style="font-size:16px">⚠️</span>
        <span class="champ-note">${ch.note}</span>
      </div>`;
    }
  });

  // Overall
  const og=document.getElementById('overall-grid');
  TEAMS.forEach(t=>{
    const s=OVERALL[t];
    const wr=Math.round(s.w/s.p*100);
    og.innerHTML+=`<div class="ocard">
      <div class="ocard-header">${logo(t,28)}<span class="ocard-name">${t}</span></div>
      <div class="ocard-stats">
        <div class="stat"><div class="stat-val">${s.p}</div><div class="stat-lbl">Oynadı</div></div>
        <div class="stat"><div class="stat-val win">${s.w}</div><div class="stat-lbl">Galibiyet</div></div>
        <div class="stat"><div class="stat-val loss">${s.l}</div><div class="stat-lbl">Mağlubiyet</div></div>
        <div class="stat"><div class="stat-val">${s.gf}</div><div class="stat-lbl">Attığı</div></div>
        <div class="stat"><div class="stat-val">${s.ga}</div><div class="stat-lbl">Yediği</div></div>
        <div class="stat"><div class="stat-val">${wr}%</div><div class="stat-lbl">Kazanma</div></div>
      </div>
      <div class="ocard-bar"><div class="ocard-bar-fill" style="width:${wr}%;background:${CLR[t]}"></div></div>
    </div>`;
  });

  // Chart
  new Chart(document.getElementById('cupsChart'),{
    type:'bar',
    data:{labels:TEAMS,datasets:[{data:TEAMS.map(t=>CUPS[t]),backgroundColor:TEAMS.map(t=>CLR[t]+'55'),borderColor:TEAMS.map(t=>CLR[t]),borderWidth:2,borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        y:{beginAtZero:true,ticks:{stepSize:1,color:'#9096aa',font:{family:'"DM Sans"',size:11}},grid:{color:'rgba(0,0,0,0.05)'},border:{color:'transparent'}},
        x:{ticks:{color:'#4a5068',font:{family:'"DM Sans"',size:11}},grid:{display:false},border:{color:'transparent'}}
      }
    }
  });
}

// SEASONS
let actS="1. Bunkerliga";
function buildSeasons(){
  const sb=document.getElementById('season-btns');
  Object.keys(SEASONS).forEach(s=>{
    const b=document.createElement('button');
    b.className='sbtn'+(s===actS?' active':'');
    b.textContent=s;
    b.onclick=()=>{actS=s;document.querySelectorAll('.sbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderST();};
    sb.appendChild(b);
  });
  renderST();
}
function renderST(){
  const sd=SEASONS[actS];
  let html=`<div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:12px">${sd.date}</div>`;
  html+=`<div class="tbl-wrap"><table class="st"><thead><tr><th>#</th><th>Takım</th><th>OM</th><th>G</th><th>B</th><th>M</th><th>AG</th><th>YG</th><th>A</th><th>P</th></tr></thead><tbody>`;
  sd.table.forEach((row,i)=>{
    const isc=sd.champion===row[0];
    html+=`<tr class="${isc?'cr':''}">
      <td><span class="pos-badge${i===0?' p1':''}">${i+1}</span></td>
      <td><div class="tcell">${logo(row[0],22)}<span>${row[0]}${isc?' 🏆':''}</span></div></td>`;
    for(let j=1;j<row.length;j++){
      const v=row[j];
      let cls='';
      if(j===8&&v>0)cls='val-pos';
      else if(j===8&&v<0)cls='val-neg';
      else if(j===9)cls='val-pts';
      html+=`<td class="${cls}">${v}</td>`;
    }
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  if(sd.note)html+=`<div class="s-note"><span>⚠️</span><span>${sd.note}</span></div>`;
  // Match list for this season
  html+=`<div style="margin-top:1.2rem">`;
  html+=`<div class="stitle" style="font-size:1rem;margin-bottom:10px">MAÇLAR</div>`;
  html+=`<div class="mlist">`;
  sd.matches.forEach(m=>{
    const isI=actS==='5. Bunkerliga'&&m[1]===13&&m[3]===0;
    const hW=m[1]>m[3],aW=m[3]>m[1];
    const hcol=hW?'var(--txt)':'var(--txt2)';
    const acol=aW?'var(--txt)':'var(--txt2)';
    const hw=hW?'font-weight:600':'';
    const aw=aW?'font-weight:600':'';
    html+=`<div class="mrow">
      <div style="flex:1;display:flex;align-items:center;justify-content:flex-end;gap:6px;color:${hcol};font-size:12px;${hw}">
        <span>${m[0]}</span>
        <img src="${LOGOS[m[0]]||''}" width="18" height="18" style="object-fit:contain;display:inline-block;flex-shrink:0" onerror="this.style.display='none'" alt="">
      </div>
      <span class="mscore">${m[1]} – ${m[3]}</span>
      <div style="flex:1;display:flex;align-items:center;gap:6px;color:${acol};font-size:12px;${aw}">
        <img src="${LOGOS[m[2]]||''}" width="18" height="18" style="object-fit:contain;display:inline-block;flex-shrink:0" onerror="this.style.display='none'" alt="">
        <span>${m[2]}</span>
      </div>
      ${isI?'<span class="mike">⚠ ŞİKE</span>':''}
    </div>`;
  });
  html+=`</div></div>`;
  document.getElementById('season-content').innerHTML=html;
}

// H2H
function buildH2H(){
  let html=`<thead><tr><th class="thl">Takım \ Rakip</th>`;
  TEAMS.forEach(t=>{html+=`<th>${dot(t,10)}<div style="margin-top:3px">${t.replace('spor','')}</div></th>`;});
  html+=`</tr></thead><tbody>`;
  TEAMS.forEach(row=>{
    html+=`<tr><td class="thl"><div class="tcell">${dot(row,9)} ${row}</div></td>`;
    TEAMS.forEach(col=>{
      if(row===col){html+=`<td class="same">—</td>`;return;}
      const d=H2H[row]&&H2H[row][col];
      if(!d){html+=`<td class="same">—</td>`;return;}
      const cls=d.w>d.l?'hwin':d.l>d.w?'hloss':'hdraw';
      html+=`<td class="hcell ${cls}" onclick="showH2H('${row}','${col}')">${d.w}G ${d.d}B ${d.l}M<br><small style="opacity:0.6;font-size:10px">${d.gf}-${d.ga}</small></td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody>`;
  document.getElementById('h2h-table').innerHTML=html;
}
function showH2H(t1,t2){
  const d=H2H[t1][t2],d2=H2H[t2][t1],tot=d.w+d.d+d.l;
  const wr1=tot?Math.round(d.w/tot*100):0,wr2=tot?Math.round(d2.w/tot*100):0;
  const txtClr=(t)=>t==='Güvenspor'?'#777777':CLR[t];
  const barClr=(t)=>CLR[t];
  document.getElementById('hd-title').innerHTML=`${logo(t1,24)} <span style="color:${txtClr(t1)}">${t1}</span> <span style="color:var(--txt3);margin:0 6px;font-weight:300">vs</span> ${logo(t2,24)} <span style="color:${txtClr(t2)}">${t2}</span>`;
  document.getElementById('hd-stats').innerHTML=`
    <div class="hd-stat"><div class="hd-stat-val" style="color:${txtClr(t1)}">${d.w}</div><div class="hd-stat-lbl">${t1} galibiyet</div></div>
    <div class="hd-stat"><div class="hd-stat-val" style="color:var(--txt2)">${d.d}</div><div class="hd-stat-lbl">Beraberlik</div></div>
    <div class="hd-stat"><div class="hd-stat-val" style="color:${txtClr(t2)}">${d2.w}</div><div class="hd-stat-lbl">${t2} galibiyet</div></div>
    <div class="hd-stat"><div class="hd-stat-val">${tot}</div><div class="hd-stat-lbl">Toplam maç</div></div>
    <div class="hd-stat"><div class="hd-stat-val">${d.gf}</div><div class="hd-stat-lbl">${t1} golü</div></div>
    <div class="hd-stat"><div class="hd-stat-val">${d2.gf}</div><div class="hd-stat-lbl">${t2} golü</div></div>
    <div style="flex-basis:100%;margin-top:4px">
      <div class="hd-bar-labels">
        <span style="color:${txtClr(t1)}">${t1} — ${wr1}%</span>
        <span style="color:var(--txt3);font-size:10px">${Math.round(d.d/tot*100)}% BER</span>
        <span style="color:${txtClr(t2)}">${wr2}% — ${t2}</span>
      </div>
      <div class="hd-bar" style="display:flex;gap:2px">
        <div style="height:100%;border-radius:3px 0 0 3px;width:${wr1}%;background:${barClr(t1)};flex-shrink:0"></div>
        <div style="height:100%;width:${Math.round(d.d/tot*100)}%;background:var(--txt3);flex-shrink:0"></div>
        <div style="height:100%;border-radius:0 3px 3px 0;width:${wr2}%;background:${barClr(t2)};flex-shrink:0;margin-left:auto"></div>
      </div>
    </div>`;
  document.getElementById('hdet').classList.add('vis');
}

// MATCHES
let actF='all';
function buildMatches(){
  const mf=document.getElementById('mfilts');
  ['all',...Object.keys(SEASONS)].forEach(f=>{
    const b=document.createElement('button');
    b.className='mfbtn'+(f===actF?' active':'');
    b.textContent=f==='all'?'Tümü':f;
    b.onclick=()=>{actF=f;document.querySelectorAll('.mfbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderMatches();};
    mf.appendChild(b);
  });
  renderMatches();
}
function renderMatches(){
  let html='';
  const sns=actF==='all'?Object.keys(SEASONS):[actF];
  sns.forEach(s=>{
    SEASONS[s].matches.forEach(m=>{
      const isI=s==='5. Bunkerliga'&&m[1]===13&&m[3]===0;
      const hW=m[1]>m[3],aW=m[3]>m[1];
      html+=`<div class="mrow">
        <span class="mtag">${s}</span>
        <span class="mteam${hW?' win':''}">${m[0]} ${logo(m[0],15)}</span>
        <span class="mscore">${m[1]} – ${m[3]}</span>
        <span class="mteama${aW?' win':''}">${logo(m[2],15)} ${m[2]}</span>
        ${isI?'<span class="mike">⚠ ŞİKE</span>':''}
      </div>`;
    });
  });
  document.getElementById('mlist').innerHTML=html;
}

buildOverview();buildSeasons();buildH2H();
